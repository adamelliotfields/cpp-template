name: build

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['main']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    env:
      CC: clang-22
      CXX: clang++-22
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install LLVM 22
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get update
          sudo apt-get install -y clang-format-22 clang-tidy-22 ninja-build
          echo "/usr/lib/llvm-22/bin" >> "$GITHUB_PATH"

      - name: Configure
        run: cmake -S . -B build -G Ninja

      - name: Format
        run: cmake --build build --target format

      - name: Lint
        run: cmake --build build --target lint

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure
